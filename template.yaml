AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  best-stickerapp-api

  Sample SAM Template for best-stickerapp-api

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Resources:

  BestStickerAppApiDev:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: BestStickerAppApiDev
      Description: Shared API Gateway

  StickerXAPIKeyAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: StickerXAPIKeyAuthorizer
      RestApiId: !Ref BestStickerAppApiDev
      Type: TOKEN
      AuthorizerUri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthorizerArn}:dev/invocations
          - AuthorizerArn: !ImportValue StickerXAPIKeyAuthorizerFunction
      IdentitySource: method.request.header.x-api-key
      AuthorizerResultTtlInSeconds: 300

  #/converter endpoint
  ConverterResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt BestStickerAppApiDev.RootResourceId
      PathPart: converter
      RestApiId: !Ref BestStickerAppApiDev
  PostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref StickerXAPIKeyAuthorizer
      HttpMethod: POST
      ResourceId: !Ref ConverterResource
      RestApiId: !Ref BestStickerAppApiDev
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncArn}:dev/invocations
          - FuncArn: !ImportValue StickerImageConverterFunction

  #/exception-notify
  NotificationReceiverResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt BestStickerAppApiDev.RootResourceId
      PathPart: exception-notification
      RestApiId: !Ref BestStickerAppApiDev
  PostMethodNotificationReceiver:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref StickerXAPIKeyAuthorizer
      HttpMethod: POST
      ResourceId: !Ref NotificationReceiverResource
      RestApiId: !Ref BestStickerAppApiDev
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncArn}/invocations
          - FuncArn: !ImportValue StickerExceptionReceiverFunction
  #/latest-version
  StickerLatestVersionTextResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt BestStickerAppApiDev.RootResourceId
      PathPart: latest-version
      RestApiId: !Ref BestStickerAppApiDev
  PostMethodStickerLatestVersionText:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      HttpMethod: GET
      ResourceId: !Ref StickerLatestVersionTextResource
      RestApiId: !Ref BestStickerAppApiDev
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncArn}/invocations
          - FuncArn: !ImportValue StickerLatestVersionTextFunction

  #/download-link
  StickerDownloadAppUriResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      ParentId: !GetAtt BestStickerAppApiDev.RootResourceId
      PathPart: download-link
      RestApiId: !Ref BestStickerAppApiDev
  PostMethodStickerDownloadAppUri:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref StickerXAPIKeyAuthorizer
      HttpMethod: GET
      ResourceId: !Ref StickerDownloadAppUriResource
      RestApiId: !Ref BestStickerAppApiDev
      Integration:
        IntegrationHttpMethod: POST
        Type: AWS_PROXY
        Uri: !Sub
          - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${FuncArn}/invocations
          - FuncArn: !ImportValue StickerDownloadAppUriFunction

  LambdaInvocationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Sub
        - "${FuncArn}:dev"
        - FuncArn: !ImportValue StickerImageConverterFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BestStickerAppApiDev}/*/*/*"

  LambdaInvocationPermissionVideoConverter:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Sub
        - "${FuncArn}:dev"
        - FuncArn: !ImportValue StickerVideoConverterFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BestStickerAppApiDev}/*/*/*"

  LambdaInvocationPermissionNotificationReceiver:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        !ImportValue StickerExceptionReceiverFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BestStickerAppApiDev}/*/*/*"

  LambdaInvokePermissionStickerLatestVersionText:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        !ImportValue StickerLatestVersionTextFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BestStickerAppApiDev}/*/*/*"

  LambdaInvokePermissionStickerDownloadAppUri:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        !ImportValue StickerDownloadAppUriFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BestStickerAppApiDev}/*/*/*"

  LambdaInvokePermissionStickerXAPIKeyAuthorizer:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Sub
        - "${FuncArn}:dev"
        - FuncArn: !ImportValue StickerXAPIKeyAuthorizerFunction
      Principal: apigateway.amazonaws.com
      SourceArn:
        Fn::Sub: "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${BestStickerAppApiDev}/*"

#About the Outputs fragment, they can:
# - Be shown in the AWS Console
# - Be used by other stacks via ImportValue
# - Be helpful for humans (like URLs or ARNs)

#'BestStickerAppApiId:' - This is the name of the output. It’s an internal name you give for reference. You can name it whatever makes sense, like ApiId, SharedApiRef, etc.
#'Description:' - This is just a human-readable description. It will appear in the CloudFormation Console when you look at the stack outputs. It helps you understand what this output is.
#'Value' - This is the actual value that CloudFormation will output.
#'Export' - This is the global export name that other stacks will use to ImportValue.
Outputs:
  BestStickerAppApiDevId:
    Description: O ID da api
    Value: !Ref BestStickerAppApiDev
    Export:
      Name: BestStickerAppApiDevId
